<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frame by Frame - Gallery</title>
    <link rel="icon" href="https://jokhanson.github.io/actual0102/photo/logo1.png">
    <link rel="stylesheet" href="https://jokhanson.github.io/actual0102/main.css">
    <link rel="stylesheet" href="https://jokhanson.github.io/actual0102/gallerystyles.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <section class="portfolio">
        <div class="portfolio-container">
            <div class="section-title">Яркие коллекции</div>
            <div class="section-description">Ознакомьтесь с коллекциями, которые являются примером авторского художественного видения и технического мастерства.</div>
            <div class="portfolio-grid" id="collections-grid"></div>
            <button class="scroll-button left">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                    <path fill="#000000" d="M11.64 5.23a1 1 0 0 0-1.41.13l-5 6a1 1 0 0 0 0 1.27l4.83 6a1 1 0 0 0 .78.37a1 1 0 0 0 .78-1.63L7.29 12l4.48-5.37a1 1 0 0 0-.13-1.4"/>
                    <path fill="#000000" d="m14.29 12l4.48-5.37a1 1 0 0 0-1.54-1.28l-5 6a1 1 0 0 0 0 1.27l4.83 6a1 1 0 0 0 .78.37a1 1 0 0 0 .78-1.63Z"/>
                </svg>
            </button>
            <button class="scroll-button right">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                    <path fill="#000000" d="m18.78 11.37l-4.78-6a1 1 0 0 0-1.41-.15a1 1 0 0 0-.15 1.41L16.71 12l-4.48 5.37a1 1 0 0 0 .13 1.41A1 1 0 0 0 13 19a1 1 0 0 0 .77-.36l5-6a1 1 0 0 0 .01-1.27"/>
                    <path fill="#000000" d="M7 5.37a1 1 0 0 0-1.61 1.26L9.71 12l-4.48 5.36a1 1 0 0 0 .13 1.41A1 1 0 0 0 6 19a1 1 0 0 0 .77-.36l5-6a1 1 0 0 0 0-1.27Z"/>
                </svg>
            </button>
        </div>
    </section>

    <section class="photolibrary">
        <div class="modal">
            <span class="close">&times;</span>
            <span class="prev">&#10094;</span>
            <span class="next">&#10095;</span>
            <img class="modal-content" id="modal-img">
        </div>
        <div class="photolibrary-container">
            <div class="section-title">Фотобиблиотека</div>
            <div class="section-description">Все работы в одном месте.</div>
            <div class="photolibrary-grid" id="all-photos-grid"></div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="https://jokhanson.github.io/actual0102/components.js"></script>
    <script src="https://jokhanson.github.io/actual0102/galleryscript.js"></script>
    <script>
    async function loadGallery() {
        try {
            const response = await fetch('https://jokhanson.github.io/actual0102/data.json');
            const data = await response.json();

            // Заполняем карусель коллекций
            const grid = document.getElementById('collections-grid');
            data.collections.forEach(collection => {
                const item = document.createElement('div');
                item.className = 'portfolio-item';
                item.onclick = () => window.location.href = 'https://jokhanson.github.io/actual0102/collection.html?id=' + collection.id;
                item.innerHTML = `
                    <img src="${collection.cover}" alt="${collection.title}">
                    <div class="overlay-text">${collection.title}</div>
                `;
                grid.appendChild(item);
            });

            // Заполняем фотобиблиотеку всеми фото
            const allGrid = document.getElementById('all-photos-grid');
            data.collections.forEach(collection => {
                collection.photos.forEach(url => {
                    const item = document.createElement('div');
                    item.className = 'photolibrary-item';
                    item.innerHTML = `<img src="${url}" alt="${collection.title}">`;
                    allGrid.appendChild(item);
                });
            });

            // Инициализируем модальное окно после загрузки всех фото
            if (typeof initGalleryModal === 'function') initGalleryModal();

        } catch (err) {
            console.error('Ошибка загрузки галереи:', err);
        }
    }

    loadGallery();
    </script>
</body>
</html>
