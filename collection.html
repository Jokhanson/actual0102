<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frame by Frame - Коллекция</title>
    <link rel="icon" href="https://jokhanson.github.io/actual0102/photo/logo1.png">
    <link rel="stylesheet" href="https://jokhanson.github.io/actual0102/main.css">
    <link rel="stylesheet" href="https://jokhanson.github.io/actual0102/gallerystyles.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <section class="photolibrary">
        <div class="modal">
            <span class="close">&times;</span>
            <span class="prev">&#10094;</span>
            <span class="next">&#10095;</span>
            <img class="modal-content" id="modal-img">
        </div>

        <div class="photolibrary-container">
            <div class="section-title" id="collection-title">Загрузка...</div>
            <div class="section-description" id="collection-description"></div>
            <div class="photolibrary-grid" id="photo-grid"></div>
        </div>
    </section>

    <section class="portfolio">
    <div class="portfolio-container">
        <div class="section-title">Другие коллекции</div>
        <div class="section-description">Посмотрите другие работы.</div>
        <div class="portfolio-grid" id="collections-grid"></div>
        <button class="scroll-button left">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                <path fill="#000000" d="M11.64 5.23a1 1 0 0 0-1.41.13l-5 6a1 1 0 0 0 0 1.27l4.83 6a1 1 0 0 0 .78.37a1 1 0 0 0 .78-1.63L7.29 12l4.48-5.37a1 1 0 0 0-.13-1.4"/>
                <path fill="#000000" d="m14.29 12l4.48-5.37a1 1 0 0 0-1.54-1.28l-5 6a1 1 0 0 0 0 1.27l4.83 6a1 1 0 0 0 .78.37a1 1 0 0 0 .78-1.63Z"/>
            </svg>
        </button>
        <button class="scroll-button right">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                <path fill="#000000" d="m18.78 11.37l-4.78-6a1 1 0 0 0-1.41-.15a1 1 0 0 0-.15 1.41L16.71 12l-4.48 5.37a1 1 0 0 0 .13 1.41A1 1 0 0 0 13 19a1 1 0 0 0 .77-.36l5-6a1 1 0 0 0 .01-1.27"/>
                <path fill="#000000" d="M7 5.37a1 1 0 0 0-1.61 1.26L9.71 12l-4.48 5.36a1 1 0 0 0 .13 1.41A1 1 0 0 0 6 19a1 1 0 0 0 .77-.36l5-6a1 1 0 0 0 0-1.27Z"/>
            </svg>
        </button>
    </div>
</section>

    <div id="footer-placeholder"></div>

    <script src="https://jokhanson.github.io/actual0102/components.js"></script>

    <script>
async function loadCollection() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (!id) {
        document.getElementById('collection-title').textContent = 'Коллекция не найдена';
        return;
    }
    try {
        const response = await fetch('https://jokhanson.github.io/actual0102/data.json');
        const data = await response.json();
        const collection = data.collections.find(c => c.id === id);
        if (!collection) {
            document.getElementById('collection-title').textContent = 'Коллекция не найдена';
            return;
        }
        document.title = 'Frame by Frame - ' + collection.title;
        document.getElementById('collection-title').textContent = collection.title;
        document.getElementById('collection-description').textContent = collection.description;
        const grid = document.getElementById('photo-grid');
        collection.photos.forEach(url => {
            const item = document.createElement('div');
            item.className = 'photolibrary-item';
            const img = document.createElement('img');
            img.src = url;
            img.alt = collection.title;
            item.appendChild(img);
            grid.appendChild(item);
        });
        initModal();

        // Загружаем другие коллекции
        const allCollections = data.collections.filter(c => c.id !== id);
        const collectionsGrid = document.getElementById('collections-grid');
        allCollections.forEach(c => {
            const item = document.createElement('div');
            item.className = 'portfolio-item';
            item.onclick = () => window.location.href = 'https://jokhanson.github.io/actual0102/collection.html?id=' + c.id;
            item.innerHTML = `
                <img src="${c.cover}" alt="${c.title}">
                <div class="overlay-text">${c.title}</div>
            `;
            collectionsGrid.appendChild(item);
        });

    } catch (err) {
        console.error('Ошибка загрузки:', err);
    }
}
function initModal() {
    const modal = document.querySelector('.modal');
    const modalImg = document.getElementById('modal-img');
    const closeBtn = document.querySelector('.close');
    const prevBtn = document.querySelector('.prev');
    const nextBtn = document.querySelector('.next');
    const items = document.querySelectorAll('.photolibrary-item img');
    let currentIndex = 0;
    items.forEach((img, index) => {
        img.addEventListener('click', () => {
            currentIndex = index;
            modalImg.src = img.src;
            modal.classList.add('active');
        });
    });
    closeBtn.addEventListener('click', () => modal.classList.remove('active'));
    modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('active'); });
    prevBtn.addEventListener('click', () => {
        currentIndex = (currentIndex - 1 + items.length) % items.length;
        modalImg.src = items[currentIndex].src;
    });
    nextBtn.addEventListener('click', () => {
        currentIndex = (currentIndex + 1) % items.length;
        modalImg.src = items[currentIndex].src;
    });
    document.addEventListener('keydown', e => {
        if (modal.classList.contains('active')) {
            if (e.key === 'ArrowLeft') prevBtn.click();
            if (e.key === 'ArrowRight') nextBtn.click();
            if (e.key === 'Escape') closeBtn.click();
        }
    });
}
loadCollection();
</script>
    
</body>
</html>
